<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jh gamer 2.0</title>
    <style>
        body {
            background-color: #000080; /* Navy */
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .nav-container {
            display: flex;
            gap: 50px;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            position: relative;
            padding: 10px 0;
            transition: all 0.3s ease; /* Smooth transition for color and scale */
            text-transform: uppercase;
        }

        /* The animated underline */
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #00d4ff; /* Neon blue highlight */
            transform: scaleX(0);      /* Start invisible */
            transform-origin: bottom right;
            transition: transform 0.4s cubic-bezier(0.86, 0, 0.07, 1); /* Smooth "slide" feel */
        }

        /* Hover States */
        .nav-link:hover {
            color: #00d4ff;
            transform: scale(1.1); /* Slight pop out effect */
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .nav-link:hover::after {
            transform: scaleX(1);      /* Animate line to full width */
            transform-origin: bottom left;
        }
        p {
            max-width: 600px;
            line-height: 1.6;
            opacity: 30;
            color: white;
        }
    

    </style>
</head>
<body>

    <nav class="nav-container">
        <a href="public.html" class="nav-link">Subscriber</a>
        <a href="private.html" class="nav-link">Admin Panel</a>
    </nav>

    <p>
        CLICK THE SUBSCRIBER BUTTON IF YOU ARE A SUBSCRIBER OR A NORMAL VIEWER<br><br>
        <strong>NOTE:</strong> ADMIN PANEL IS ONLY FOR JH GAMER ADMINS
    </p>

</body>
</html>
